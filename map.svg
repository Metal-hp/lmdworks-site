  <!-- Pacific Ocean -->
  <text transform="translate(20,230) rotate(-90)" text-anchor="middle"
        style="font-size:8px; fill:#D9CCAF; fill-opacity:0.55; font-family:'IBM Plex Mono',monospace; letter-spacing:0.1em; text-transform:uppercase;">Pacific Ocean</text>

  <!-- Colorado River -->
  <text transform="translate(872,190) rotate(90)" text-anchor="middle"
        style="font-size:7.5px; fill:#1C1409; fill-opacity:0.4; font-family:'IBM Plex Mono',monospace; letter-spacing:0.08em; text-transform:uppercase;">Colorado R.</text>

  <!-- Camp Pendleton -->
  <text x="6" y="66"
        style="font-size:6.5px; fill:#3D2E18; fill-opacity:0.45; font-family:'IBM Plex Mono',monospace; letter-spacing:0.1em; text-transform:uppercase;">Camp Pendleton</text>

  <!-- North arrow -->
  <g transform="translate(856,18)">
    <line x1="0" y1="14" x2="0" y2="1" stroke="#3D2E18" stroke-width="1.2" stroke-opacity="0.45"/>
